[seeed_base]
platform = Seeed Studio
board = seeed-xiao-afruitnrf52-nrf52840-sense
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit NeoPixel

[env:seeed-release]
extends = seeed_base

[env:seeed-debug]
extends = seeed_base
build_flags = -D VORTEX_DEBUG

; Host-side unit tests — no hardware required
; Run with: pio test -e native
[env:native]
platform = native
build_flags = -std=c++17
